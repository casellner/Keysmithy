<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Keysmithy</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="" />
    <link rel="stylesheet" type="text/css" href="./public/style.css">

    <!-- favicon -->
    <link rel="icon" type="image/png" href="./public/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./public/favicon.svg" />
    <link rel="shortcut icon" href="./public/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./public/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Keysmithy" />
    <link rel="manifest" href="./public/site.webmanifest" />

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manufacturing+Consent&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1>Keysmithy (alpha version)</h1>
        <div  class="justify-center">
            <div class="justify-center">
                <img class="resource-icon" src="./public/rock_resource.png">
                <p id="num-rock">0</p>
            </div>
            <div class="justify-center">
                <img class="resource-icon" src="./public/rock_resource.png">
                <p id="num-wood">0</p>
            </div>
        </div>
    </header>

    <div class="row1">
        <article id="rock-article">
            <div class="row2">
                <img id="rock-img" src="./public/rock_idle.png">

                <div>
                    <h2>Type to Mine</h2>
                    <label id="rock-input-label" for="rock-input"></label>
                    <br>
                    <textarea id="rock-input" placeholder="Type here"></textarea>
                    <br>
                    <button onClick="toggleResource()">Switch resources</button>
                </div>
            </div>
        </article>

        <article id="wood-article" hidden>
            <div class="row2">
                <img id="wood-img" src="./public/rock_idle.png">

                <div>
                    <h2>Type to Chop</h2>
                    <label id="wood-input-label" for="wood-input"></label>
                    <br>
                    <textarea id="wood-input" placeholder="Type here"></textarea>
                    <br>
                    <button onClick="toggleResource()">Switch resources</button>
                </div>
            </div>
        </article>

        <div class="center-column border-left">
            <h3>Brought to You By</h3>
            <img id="sponsor" src="./public/Tridev Logo.svg">
        </div>
    </div>

    <div> <!-- SHOP -->
        <h2>Shop</h2>
        <div>
            <p>Cost: <span id="pickCost">X</span> score</p>
            <button onClick="upgradePick()">Upgrade Pickaxe</button>
        </div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
