<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Keysmith</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="" />
    <link rel="icon" href="./public/favicon.ico">
    <link rel="stylesheet" type="text/css" href="./public/style.css">

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manufacturing+Consent&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1>Keysmithy (alpha version)</h1>
        <div class="resource-group">
            <img id="rock-resource" src="./public/rock_resource.png">
            <p id="score">0</p>
        </div>
    </header>

    <article>
        <img id="rock" src="./public/rock_idle.png">

        <div class="center-children">
            <label id="inputLabel" for="myInput"></label>
            <textarea id="myInput" placeholder="Type the word above"></textarea>
            <button hidden>Switch resources</button>
        </div>

        <div class="center-children border-left">
            <h3>Brought to You By</h3>
            TODO: add Google Ads
        </div>
    </article>

    <div> <!-- SHOP -->
        <h2>Shop</h2>
        <div>
            <p>Cost: <span id="pickCost">X</span> score</p>
            <button onClick="upgradePick()">Upgrade Pickaxe</button>
        </div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
