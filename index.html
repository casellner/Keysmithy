<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Keysmithy</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="" />
    <link rel="stylesheet" type="text/css" href="./public/style.css">

    <!-- favicon -->
    <link rel="icon" type="image/png" href="./public/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./public/favicon.svg" />
    <link rel="shortcut icon" href="./public/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./public/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Keysmithy" />
    <link rel="manifest" href="./public/site.webmanifest" />

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manufacturing+Consent&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1>Keysmithy (alpha version)</h1>
        <div class="resource-group">
            <img id="rock-resource" src="./public/rock_resource.png">
            <p id="score">0</p>
        </div>
    </header>

    <article>
        <img id="rock" src="./public/rock_idle.png">

        <div>
            <h2>Type to Mine</h2>
            <label id="inputLabel" for="myInput"></label>
            <br>
            <textarea id="myInput" placeholder="Type here"></textarea>
            <button hidden>Switch resources</button>
        </div>

        <div class="center-children border-left">
            <h3>Brought to You By</h3>
            <img id="sponsor" src="./public/Tridev Logo.svg">
        </div>
    </article>

    <div> <!-- SHOP -->
        <h2>Shop</h2>
        <div>
            <p>Cost: <span id="pickCost">X</span> score</p>
            <button onClick="upgradePick()">Upgrade Pickaxe</button>
        </div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
